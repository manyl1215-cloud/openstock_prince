name: Opening Premium Monitor

on:
  schedule:
    # 台灣時間 09:16 (UTC 01:16)，週一至週五
    - cron: '16 1 * * 1-5'
  workflow_dispatch:

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 升級到 v4

      - name: Setup Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.11'

      - name: Install Libs
        run: |
          pip install yfinance pandas requests gspread google-auth

      - name: Execute Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python stock_monitor.py
