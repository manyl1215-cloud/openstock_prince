name: Taiwan Stock Automated Monitor

on:
  schedule:
    - cron: '15 23 * * 1-5' # 09:15 TW
    - cron: '0 7 * * 1-5'  # 16:00 TW
    - cron: '0 00 * * 6'    # 09:00 Sat
  workflow_dispatch: # 允許手動點擊測試

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests gspread google-auth FinMind tqdm

      - name: Execute Stock Monitor Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python stock_monitor.py
