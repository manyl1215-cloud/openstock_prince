name: Stock opening Premium Monitor

on:
  schedule:
    # 台灣時間 09:15 (等於 UTC 01:15)，週一至週五執行
    - cron: '15 1 * * 1-5'
  workflow_dispatch: # 允許您在 GitHub 頁面上手動點擊執行測試

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 使用最新 v4 版本避免警告

      - name: Setup Python
        uses: actions/setup-python@v5 # 使用最新 v5 版本避免警告
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests gspread google-auth

      - name: Execute Stock Monitor Script
        env:
          # 這裡必須與您在 GitHub Secrets 中設定的名稱完全一致
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python stock_monitor.py
