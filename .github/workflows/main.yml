name: Opening Premium Monitor

on:
  schedule:
    # 台灣時間 09:01 (UTC 01:01)，週一至週五執行
    - cron: '1 1 * * 1-5'
  workflow_dispatch: # 允許手動測試

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install yfinance pandas requests
      - name: Execute Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_monitor.py
